; PlatformIO Project Configuration File
;
;   本项目支持两个编译目标：
;   1. PC 模拟器 (native) - 用于开发和测试
;   2. ESP32-S3 开发板 (esp32-s3-devkitc-1) - 实际硬件运行
;
;   切换编译目标的方法：
;   - 方法1: 修改 default_envs 的值（推荐）
;   - 方法2: 使用命令行: pio run -e <环境名>
;     例如: pio run -e esp32s3  或  pio run -e pc_simulator
;
;   详细说明请参考 README.md

[platformio]
; 默认编译环境，修改此行切换目标平台
; 可选值: pc_simulator 或 esp32s3
default_envs = pc_simulator

; ============================================
; PC 模拟器环境 (native)
; ============================================
[env:pc_simulator]
platform = native
build_flags = 
    -lSDL2
    -lm
    -D PC_SIMULATOR
    -D SDL_MAIN_HANDLED
    -D _USE_MATH_DEFINES
    -I"C:/msys64/mingw64/include/SDL2"
    -L"C:/msys64/mingw64/lib"

; ============================================
; ESP32-S3 开发板环境
; 屏幕: ST7789P3 76x284 (旋转后284x76)
; ============================================
[env:esp32s3]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; N16R8 配置
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

; 定义ESP32S3目标宏
build_flags =
    -D ESP32S3_TARGET
    ;-D TFT_TEST_PATTERN    ; 启用开机测试画面（红框+RGB色块）

; 库依赖
lib_deps =
    tzapu/WiFiManager@^2.0.16
    arduino-libraries/NTPClient@^3.2.1

; 监控端口波特率
monitor_speed = 115200

; 上传配置 (可选，自动检测)
; upload_port = COM3
